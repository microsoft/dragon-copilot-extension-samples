# OpenAPI spec defining the API contract for extensions for Dragon Copilot for Radiology.

openapi: 3.0.0
info:
  title: Radiology Extensibility API
  version: 0.0.1
  description: API definition for enabling Dragon Copilot for Radiology extension integrations

paths:
  /v1/process:
    post:
      summary: Process Radiology Standard payload
      description: >-
        Endpoint to trigger processing within a Radiology extension.
      operationId: processDragonRadiology
      parameters:
        - name: x-ms-request-id
          in: header
          required: false
          schema:
            type: string
          description: >-
            Unique request identifier. In case of retries for the same call,
            this value is the same.
        - name: x-ms-correlation-id
          in: header
          required: false
          schema:
            type: string
          description: >-
            Correlation identifier for tracking. Stays the same for the entire execution
            of multiple extensions in the scope of a single execution flow.
        - name: x-dre-custom-header
          in: header
          description: >-
            Arbitrary custom Dragon Extension header. Any number of custom headers with the
            x-dre- prefix are allowed. They originate from the installation of the extension
            and are passed through to the extension.
          required: false
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessRequest"
      responses:
        "200":
          description: Successfully processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Invalid payload format"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Unauthorized."
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Internal server error occurred"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProcessRequest:
      type: object
      description: >-
        Request envelope for /v1/process.
      required:
        - schema_version
        - sessionData
      properties:
        schema_version:
          type: string
          description: >-
            Wire-level contract version of the Radiology Extensibility API envelope.
            Mirrors the MAJOR.MINOR of `info.version`.
          example: "0.0"
        sessionData:
          $ref: "#/components/schemas/SessionData"
      additionalProperties:
        oneOf:
          - $ref: "#/components/schemas/PatientInformation"
          - $ref: "#/components/schemas/Report"

    ProcessResponse:
      type: object
      required:
        - schema_version
      properties:
        schema_version:
          type: string
          description: >-
            Wire-level contract version of the Radiology Extensibility API envelope.
            Mirrors the MAJOR.MINOR of `info.version`.
          example: "0.0"
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Payload processed successfully"
        payload:
          type: object
          description: >-
            Map of named outputs. Each key is the output name declared in the extension
            manifest, and its value is a QualityCheckResult.
          additionalProperties:
            $ref: "#/components/schemas/QualityCheckResult"

    SessionData:
      type: object
      description: Session context for request correlation and tracking.
      properties:
        correlation_id:
          type: string
          description: Unique session correlation identifier.
          example: "f40dd0d0-4201-d29d-79b4-df40189fd2f0"
        session_start:
          type: string
          format: date-time
          description: Session start timestamp.
          example: "2025-06-20T08:57:35.978Z"
        environment_id:
          type: string
          description: Environment identifier.
          example: "01bd0d47-1621-4a29-941d-00e9a9420f20"

    PatientInformation:
      type: object
      description: Patient demographic information.
      properties:
        dateOfBirth:
          type: string
          description: The date of birth of the patient in YYYY-MM-DD format.
          format: date
          example: "1990-01-15"
        biologicalSex:
          type: string
          description: The sex of the patient.
          enum:
            - "Male"
            - "Female"
            - "Unknown"
            - "Other"
          example: "Male"

    Report:
      type: object
      required:
        - reportText
      properties:
        reportText:
          type: string
          description: The radiology report text.
          example: "No acute cardiopulmonary abnormality."

    QualityCheckResult:
      type: object
      required:
        - recommendations
      properties:
        recommendations:
          type: array
          description: An array of billing quality check recommendations. This will be an empty list if there are no recommendations.
          items:
            $ref: "#/components/schemas/Recommendation"

    Recommendation:
      type: object
      required:
        - qualityCheckType
        - description
        - reason
      properties:
        qualityCheckType:
          type: string
          description: The type of quality check.
          enum:
            - "Billing"
            - "Clinical"
          example: "Billing"
        description:
          type: string
          description: The description of the recommendation.
          example: "Missing CPT modifier for bilateral procedure."
        reason:
          type: string
          description: The reason for this recommendation.
          example: "Bilateral chest X-ray performed but only unilateral code submitted."
        severityScorePercent:
          type: number
          description: The severity of the recommendation.
          minimum: 0
          maximum: 100
          example: 75
        provenance:
          type: array
          description: Identifies the list of sections in the report that were used to generate this recommendation.
          items:
            $ref: "#/components/schemas/Provenance"
        referenceResources:
          type: array
          description: >-
            This array contains a list of various types of resource like website url, pdf document name,
            chat prompt, etc. that helps understand the recommendation.
          items:
            $ref: "#/components/schemas/ReferenceResource"
        additionalInfo:
          type: object
          description: A dictionary of name and value. It is used for partners to send any additional information regarding their recommendations.
          additionalProperties:
            type: string

    Provenance:
      type: object
      description: Identifies a section in the report that was used to generate a recommendation.
      properties:
        text:
          type: string
          description: The section of the actual report text associated with this recommendation.
        startPosition:
          type: number
          description: The offset within the report text that marks the start of the section that was used to generate this recommendation.
        endPosition:
          type: number
          description: The offset within the report text that marks the end of the section that was used to generate this recommendation.

    ReferenceResource:
      type: object
      description: A reference resource that helps understand the recommendation.
      properties:
        type:
          type: string
          description: The type of reference resource (e.g., website url, pdf document name, chat prompt).
        content:
          type: string
          description: The content of the reference resource.
