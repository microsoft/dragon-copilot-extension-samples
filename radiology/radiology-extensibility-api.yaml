# OpenAPI spec defining the API contract for extensions for Dragon Copilot for Radiology (DCR).

openapi: 3.0.0
info:
  title: DCR Extensibility API
  version: 0.0.1
  description: API definition for enabling Dragon Copilot for Radiology extension integrations

paths:
  /v1/process:
    post:
      summary: Process DCR Standard payload
      description: >-
        Endpoint to trigger processing within a DCR extension. Receives inputs in the
        DCR Standard payload containing radiology report and/or radiology dictation data.
      operationId: processDragonStandard
      parameters:
        - name: x-ms-request-id
          in: header
          required: false
          schema:
            type: string
          description: >-
            Unique request identifier. In case of retries for the same call,
            this value is the same.
        - name: x-ms-correlation-id
          in: header
          required: false
          schema:
            type: string
          description: >-
            Correlation identifier for tracking. Stays the same for the entire execution
            of multiple extensions in the scope of a single execution flow.
        - name: x-dre-custom-header
          in: header
          description: >-
            Arbitrary custom Dragon Extension header. Any number of custom headers with the
            x-dre- prefix are allowed. They originate from the installation of the extension
            and are passed through to the extension.
          required: false
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DragonStandardPayload"
      responses:
        "200":
          description: Successfully processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Invalid payload format"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Unauthorized."
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Internal server error occurred"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ---------------------------------------------------------------------------
    # Request envelope
    # ---------------------------------------------------------------------------
    DragonStandardPayload:
      type: object
      description: >-
        Request envelope for /v1/process. Contains session metadata and named input
        payloads, where each key is an input declared in the extension manifest, and
        its value is the corresponding payload type (RadiologyReport, RadiologyDictation,
        etc.).
      required:
        - schema_version
        - sessionData
      properties:
        schema_version:
          type: string
          description: >-
            Wire-level contract version of the DCR Extensibility API envelope.
            Mirrors the MAJOR.MINOR of `info.version`.
          example: "0.0"
        sessionData:
          $ref: "SessionData.yaml#/SessionData"
      additionalProperties:
        oneOf:
          - $ref: "PatientInformation.yaml#/PatientInformation"
          - $ref: "Report.yaml#/Report"

    # ---------------------------------------------------------------------------
    # Response envelope
    # ---------------------------------------------------------------------------
    ProcessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Payload processed successfully"
        payload:
          type: object
          description: >-
            Map of named outputs. Each key is the output name declared in the extension
            manifest, and its value is a QualityCheckResult.
          additionalProperties:
             $ref: "QualityCheckResult.yaml#/QualityCheckResult"
