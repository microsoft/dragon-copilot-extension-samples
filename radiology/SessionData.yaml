SessionData:
  type: object
  description: Session context for request correlation and tracking.
  properties:
    correlation_id:
      type: string
      description: Unique session correlation identifier.
      example: "f40dd0d0-4201-d29d-79b4-df40189fd2f0"
    session_start:
      type: string
      format: date-time
      description: Session start timestamp.
      example: "2025-06-20T08:57:35.978Z"
    environment_id:
      type: string
      description: Environment identifier.
      example: "01bd0d47-1621-4a29-941d-00e9a9420f20"
