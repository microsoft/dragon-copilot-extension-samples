name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-physicians:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - name: physician
            models: physician/src/models/Dragon.Copilot.Physician.Models
            samples: physician/src/samples/DragonCopilot/Workflow
            dockerfile: physician/src/samples/DragonCopilot/Workflow/SampleExtension.Web/Dockerfile

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '9.0.x'

    - name: Build ${{ matrix.product.name }} Models
      run: |
        cd ${{ matrix.product.models }}
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test ${{ matrix.product.name }} Models
      run: |
        cd ${{ matrix.product.models }}
        dotnet test --no-build --configuration Release --verbosity normal

    - name: Build ${{ matrix.product.name }} Sample
      run: |
        cd ${{ matrix.product.samples }}
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test ${{ matrix.product.name }} Sample
      run: |
        cd ${{ matrix.product.samples }}
        dotnet test --no-build --configuration Release --verbosity normal

    - name: Build ${{ matrix.product.name }} Docker Image
      run: |
        docker build -f ${{ matrix.product.dockerfile }} -t ${{ matrix.product.name }}-sample-extension .

  build-and-test-radiologists:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '10.0.x'

    - name: Build Radiologists Models
      working-directory: radiologists/src/models/Dragon.Copilot.Radiologists.Models
      run: |
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test Radiologists Models
      working-directory: radiologists/src/models/Dragon.Copilot.Radiologists.Models
      run: |
        dotnet test --no-build --configuration Release --verbosity normal

    - name: Build Radiologists Quickstart sample (cross-platform)
      working-directory: radiologists/src/samples/Workflow/SampleExtension.Radiologists.Web.Quickstart
      run: |
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test Radiologists Quickstart sample
      working-directory: radiologists/src/samples/Workflow/SampleExtension.Radiologists.Web.Quickstart.Tests
      run: |
        dotnet test --configuration Release --verbosity normal

    - name: Build Radiologists AI sample (cross-platform, Azure OpenAI)
      working-directory: radiologists/src/samples/Workflow/SampleExtension.Radiologists.Web.Ai
      run: |
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test Radiologists AI sample
      working-directory: radiologists/src/samples/Workflow/SampleExtension.Radiologists.Web.Ai.Tests
      run: |
        dotnet test --configuration Release --verbosity normal

    - name: Build Radiologists Quickstart Docker image
      run: |
        docker build -f radiologists/src/samples/Workflow/SampleExtension.Radiologists.Web.Quickstart/Dockerfile -t radiologists-quickstart-sample .

    - name: Build Radiologists AI Docker image
      run: |
        docker build -f radiologists/src/samples/Workflow/SampleExtension.Radiologists.Web.Ai/Dockerfile -t radiologists-ai-sample .

  build-radiologists-foundry-local:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '10.0.x'

    # The Foundry Local sample is Windows-only (net10.0-windows, Microsoft.AI.Foundry.Local.WinML),
    # so it is built on a Windows runner rather than the cross-platform ubuntu job above.
    - name: Build Radiologists Foundry Local sample (Windows-only, on-device)
      working-directory: radiologists/src/samples/Workflow/SampleExtension.Radiologists.Web.Local
      run: |
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test Radiologists Foundry Local sample (Windows-only, on-device)
      working-directory: radiologists/src/samples/Workflow/SampleExtension.Radiologists.Web.Local.Tests
      run: |
        dotnet test --configuration Release --verbosity normal

  nodejs-tools:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: tools/dragon-copilot-cli/package-lock.json

    - name: Install dependencies
      working-directory: tools/dragon-copilot-cli
      run: npm ci

    - name: Run tests
      working-directory: tools/dragon-copilot-cli
      run: npm test

    - name: Build
      working-directory: tools/dragon-copilot-cli
      run: npm run build --if-present

    - name: Verify bundle
      working-directory: tools/dragon-copilot-cli
      run: npm run bundle
