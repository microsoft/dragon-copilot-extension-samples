name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product:
          - name: physician
            models: physician/src/models/Dragon.Copilot.Physician.Models
            samples: physician/src/samples/DragonCopilot/Workflow
            dockerfile: physician/src/samples/DragonCopilot/Workflow/SampleExtension.Web/Dockerfile

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Build ${{ matrix.product.name }} Models
      run: |
        cd ${{ matrix.product.models }}
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test ${{ matrix.product.name }} Models
      run: |
        cd ${{ matrix.product.models }}
        dotnet test --no-build --configuration Release --verbosity normal

    - name: Build ${{ matrix.product.name }} Sample
      run: |
        cd ${{ matrix.product.samples }}
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test ${{ matrix.product.name }} Sample
      run: |
        cd ${{ matrix.product.samples }}
        dotnet test --no-build --configuration Release --verbosity normal

    - name: Build ${{ matrix.product.name }} Docker Image
      run: |
        docker build -f ${{ matrix.product.dockerfile }} -t ${{ matrix.product.name }}-sample-extension .

  nodejs-tools:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: tools/dragon-copilot-cli/package-lock.json

    - name: Install dependencies
      working-directory: tools/dragon-copilot-cli
      run: npm ci

    - name: Run tests
      working-directory: tools/dragon-copilot-cli
      run: npm test

    - name: Build
      working-directory: tools/dragon-copilot-cli
      run: npm run build --if-present

    - name: Verify bundle
      working-directory: tools/dragon-copilot-cli
      run: npm run bundle
